name: Post to X (Twitter)

on:
  push:
    paths: ['stories/*.json']

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install twitter-api-v2

      - name: Get changed story file
        id: story
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD | grep 'stories/.*\.json' | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Post thread to X
        if: steps.story.outputs.file != ''
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          node scripts/post-x.js "${{ steps.story.outputs.file }}"
