name: Worldcup CI

# Build-check guardrail: no PR that breaks typecheck or the production build
# can merge. Scoped to worldcup/** so store/content PRs are untouched
# (monorepo boundary agreement — see CLAUDE.md).

on:
  pull_request:
    paths:
      - "worldcup/**"
      - ".github/workflows/worldcup-ci.yml"
  push:
    branches: [main]
    paths:
      - "worldcup/**"

concurrency:
  group: worldcup-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worldcup/frontend
    env:
      # Dummy — prisma generate + next build never connect to a DB (all data
      # pages are force-dynamic), but the client requires the var to exist.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worldcup/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Production build
        run: npx next build
