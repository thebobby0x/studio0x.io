# Supabase local/CLI config for the studio0x market backend.
# project_id is set when you run `supabase link --project-ref <ref>`.
project_id = "studio0x-market"

[functions.create-checkout-session]
# Storefront calls this anonymously (no login required to buy).
verify_jwt = false

[functions.stripe-webhook]
# Stripe calls this; we verify the Stripe signature instead of a JWT.
verify_jwt = false

[functions.get-order]
# Success page polls this anonymously with the Stripe session_id.
verify_jwt = false

[functions.ai-create-product]
# Phase 2 AI creator pipeline. Requires a valid Supabase JWT; the function
# further checks the caller is an admin before generating draft products.
verify_jwt = true

[functions.admin-create-user]
# Team management. Requires a valid Supabase JWT; the function further checks
# the caller is a superadmin before creating a new admin/superadmin teammate.
verify_jwt = true
